<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{normal/base::Layout(~{::section})}">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">


    <title>User dashBoard</title>
</head>
<body>
<section>
    <div class="container">
        <div class="card">
            <div class="card-body">
                <div class="container text-center">
                    <img style="height:300px; width:200px;" src="" class="my_picture"
                         th:src="@{'/Image/'+${user.imageURL}}" alt="profile photo"/>
                </div>
                <h1 class="text-center mt-3" th:text="${user.name}"></h1>
                <table class=" profile-table">
                    <thead>
						<tr>
							<th class="leftText" scope="col">#userId</th>
							<td class="leftText" scope="col">SCM2020_<span th:text="${user.id}"></span></td>
						</tr>
                    </thead>
                    <tbody>
						<tr>
							<th class="leftText" scope="row">Email</th>
							<td class="leftText"><span th:text="${user.email}"></span></td>
						</tr>
						<tr>
							<th class="leftText" scope="row">Phone Number</th>
							<td class="leftText" ><span th:text="${user.phoneNumber}"></span></td>
						</tr>
                        <tr>
                            <th class="leftText" scope="row">Gender</th>
                            <td class="leftText"><span th:text="${user.gender?.label} ?: 'N/A'"></span></td>
                        </tr>
						<tr>
							<th class="leftText" scope="row">DOB</th>
							<td class="leftText"><span th:text="${user.DOB}"></span></td>
						</tr>
						<tr>
							<th class="leftText" scope="row">Address</th>
							<td class="leftText"><span th:text="${user.address}"></span></td>
						</tr>
						<tr>
							<th class="leftText" scope="row">About you</th>
							<td class="leftText"><span th:text="${user.about}"></span></td>
						</tr>
                    </tbody>
                </table>
                <div class="d-flex justify-content-center mt-3">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#editModal">
                        Edit Profile
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Edit Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal">x</button>
                </div>

                <div class="modal-body">

                    <form th:action="@{/user/profile}" method="post" th:object="${user}">
                        <input type="hidden" th:field="*{id}"/>
                        <div class="mb-3">
                            <label>Name</label>
                            <input type="text" th:field="*{name}" class="form-control"/>
                        </div>
                        <div class="mb-3">
                            <label>Phone</label>
                            <input type="text" th:field="*{phoneNumber}" class="form-control"/>
                        </div>
                        <div class="mb-3">
                            <label for="gender" class="form-label">Gender</label>
                            <select id="gender" th:field="*{gender}" class="form-control">
                                <option value=""> Select Contact Type </option>
                                <option th:each="type : ${genderList}"
                                        th:value="${type}" th:text="${type.label}">
                                </option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>DOB</label>
                            <input type="date" th:field="*{DOB}" class="form-control"/>
                        </div>
                        <div class="mb-3">
                            <label>Address</label>
                            <input type="text" th:field="*{address}" class="form-control"/>
                        </div>
                        <div class="mb-3">
                            <label>About</label>
                            <textarea th:field="*{about}" class="form-control"></textarea>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-success">Update</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <script>
		 $(document).ready(()=>{
			$(".item").removeClass("active");
			$("#profile-link").addClass("active");
		 });

    </script>
</section>
</body>
</html>
