<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{normal/base::Layout(~{::section})}">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">


    <title>User dashBoard</title>
  </head>
  <body>
    <section>
		<div class="container">
		 <div class="card">
			 <div class="card-body">
                 <div class="container text-center">
	                 <img style="height:300px; width:200px;" src="" class="my_picture" th:src="@{'/Image/'+${user.imageURL}}" alt="profile photo"/>
				 </div>
				 <h1 class="text-center mt-3" th:text="${user.name}"></h1>
				     <table class="table text-center">
							  <thead>
							    <tr>
							      <th scope="col">#userId</th>
							      <th scope="col">SCM2020_<span th:text="${user.id}"></span></th>
							     
							    </tr>
							  </thead>
							  <tbody>
							    <tr>
							      <th scope="row">Email</th>
							      <td><span th:text="${user.email}"></span></td>
							      
							    </tr>
							    <tr>
							      <th scope="row">Account Active</th>
							      <td><span th:text="${user.enabled}"></span></td>
							      
							    </tr>
							    <tr>
							      <th scope="row">role</th>
							      <td><span th:text="${user.role}"></span></td>
							      
							    </tr>
							    <tr>
							      <th scope="row">About you</th>
							      <td><span th:text="${user.about}"></span></td>
							      
							    </tr>
							  </tbody>    
					</table>
<!--				 <div class="text-center mt-3">-->
<!--					 <a th:href="@{'/user/edit/' + ${user.id}}" class="btn btn-primary">-->
<!--						 Edit Profile-->
<!--					 </a>-->
<!--				 </div>-->
				 <div class="d-flex justify-content-center mt-3">
					 <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#editModal">
						 Edit Profile
					 </button>
				 </div>
			 </div>
		 </div>	            
		</div>

		<!-- Bootstrap JS -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

		<div class="modal fade" id="editModal" tabindex="-1">
			<div class="modal-dialog">
				<div class="modal-content">

					<div class="modal-header">
						<h5 class="modal-title">Edit Profile</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal">x</button>
					</div>

					<div class="modal-body">

						<form th:action="@{/user/profile}" method="post" th:object="${user}">
							<input type="hidden" th:field="*{id}" />
							<div class="mb-3">
								<label>Name</label>
								<input type="text" th:field="*{name}" class="form-control"/>
							</div>
							<div class="mb-3">
								<label>Email</label>
								<input type="email" th:field="*{email}" class="form-control"/>
							</div>
							<div class="mb-3">
								<label>About</label>
								<textarea th:field="*{about}" class="form-control"></textarea>
							</div>
							<div class="text-center">
								<button type="submit" class="btn btn-success">Update</button>
							</div>
						</form>

					</div>
				</div>
			</div>
		</div>

	 <script>
		 $(document).ready(()=>{
			$(".item").removeClass("active");
			$("#profile-link").addClass("active");
		 });
	   </script>
	</section>
  </body>
</html>
